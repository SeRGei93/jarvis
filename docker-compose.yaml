# jarvis — container orchestration (root of the monorepo).
#
# Layout:
#   backend/   Node + Mastra service (Telegram bot + cron + admin API, one process)
#   frontend/  Admin Mini App (React + Vite) — built to static assets
#
# Single-container model (M8): the admin Mini App is built to `frontend/dist` and
# served as static by the backend's Hono server (GET / + /assets/*), so there is
# NO separate frontend container — the one backend process hosts API + Mini App.
#
#   Local dev (two terminals, hot reload):
#     cd backend  && npm run dev      # API + bot + cron on :8080
#     cd frontend && npm run dev      # Vite Mini App on :5173 (proxies /admin/api → :8080)
#   Static (single origin):
#     cd frontend && npm run build    # → frontend/dist (served by the backend)
#
# NOTE: the multi-stage Dockerfile (build frontend → copy dist → run backend) is
#       added in milestone 9; this file is the deployment scaffold.

services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      # libSQL DB file on a named volume so data survives restarts.
      LIBSQL_URL: file:/data/avocado.db
    volumes:
      - jarvis-data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  jarvis-data:
