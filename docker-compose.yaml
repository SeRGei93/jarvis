# jarvis — container orchestration (root of the monorepo).
#
# Layout:
#   backend/   Node + Mastra service (Telegram bot + cron + admin API, one process)
#   frontend/  Admin Mini App (React + Vite) — built as static assets
#
# NOTE: Dockerfiles are added in milestone 9. Until then, run locally with
#       `cd backend && npm run dev`. This file is the deployment scaffold.

services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      # libSQL DB file on a named volume so data survives restarts.
      LIBSQL_URL: file:/data/avocado.db
    volumes:
      - jarvis-data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped

  # Admin Mini App — enabled in milestone 8.
  # frontend:
  #   build:
  #     context: ./frontend
  #   ports:
  #     - "5173:5173"
  #   depends_on:
  #     - backend

volumes:
  jarvis-data:
