# jarvis — production deployment (root of the monorepo).
#
#   app     one Node container: Telegram bot + cron + admin API + Mini App (static)
#   searxng metasearch engine the app queries for web search (internal only)
#   redis   cache/coordination backend for searxng (internal only)
#
# TLS + the public domain are handled by an EXTERNAL Caddy that lives on the
# shared `edge` network and reverse-proxies to this app by container name:
#     reverse_proxy jarvis-app:8080
# The Mini App is at https://<domain>/miniapp (the @BotFather menu-button URL).
#
# Prereq: the shared network must exist once on the host —  docker network create edge
# First deploy:  make deploy   (provisions .env, builds, starts everything).
# See docs/deployment.md. Values like DOMAIN / secrets come from the root .env.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Fixed name so the external Caddy can target `jarvis-app:8080` on `edge`.
    container_name: jarvis-app
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # libSQL file lives on the shared ./data dir (host-visible, survives redeploys).
      LIBSQL_URL: file:/data/avocado.db
      # Web search: talk to searxng over the internal docker network.
      SEARXNG_URL: http://searxng:8080
      # Web fetch/search file cache (under the mounted ./data/db → /data).
      WEB_CACHE_DIR: /data/web-cache
      # File-backed skill/prompt store on the persistent volume — populated from
      # the image's bundled defaults on first run; admin edits persist here.
      SKILLS_DIR: /data/skills
      PROMPTS_DIR: /data/prompts
    volumes:
      - ./data/db:/data
    expose:
      - "8080" # not published to the host — reached by Caddy over the `edge` network
    networks:
      - default # private project net (reaches searxng/redis)
      - edge    # shared net with the external Caddy
    # Plain list (not condition) so app still boots even if searxng is slow.
    depends_on:
      - searxng
    restart: unless-stopped

  # Cache/coordination backend for searxng (internal only).
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - ./data/redis:/data

  # Self-hosted metasearch engine — the backend queries it for web search (json).
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SEARXNG_SECRET: "${SEARXNG_SECRET:?set SEARXNG_SECRET in .env}"
      SEARXNG_BASE_URL: "http://localhost:8080/"
    volumes:
      - ./deploy/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ./deploy/searxng/limiter.toml:/etc/searxng/limiter.toml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null 'http://localhost:8080/healthz' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

networks:
  default: # private project network (created automatically)
  edge:
    external: true # shared network with the external Caddy (create once: docker network create edge)

# All persistent state lives in the host-visible ./data directory:
#   ./data/db           libSQL database file (avocado.db)
#   ./data/db/web-cache web fetch/search cache (app mounts ./data/db → /data, WEB_CACHE_DIR=/data/web-cache)
#   ./data/redis        redis persistence (searxng cache/coordination)
# TLS certificates are owned by the external Caddy — not stored under ./data.
